<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Suporte</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>Forúm de mensagens</h1>
            <p>Atendimento em tempo real</p>
        </div>

        <div class="chat-container">

            <div class="form-container">

                <input
                    type="text"
                    id="cliente"
                    placeholder="Nome do Cliente">

                <button onclick="criarSessao()">
                    Criar Sessão
                </button>

                <input
                    type="number"
                    id="sessaoId"
                    placeholder="ID da Sessão"
                    readonly>

                <textarea
                    id="mensagem"
                    placeholder="Digite sua mensagem">
                </textarea>

                <button onclick="enviarMensagem()">
                    Enviar Mensagem
                </button>

            </div>

            <div class="historico-container">

                

                <h2>📨 Histórico de Conversas</h2>
                

                <div id="historico"></div>

            </div>

        </div>

        <div class="notificacoes-container">

            <h2>🔔 Notificações</h2>

            <button onclick="buscarNotificacoes()">
                Atualizar Notificações
            </button>

            <div id="notificacoes"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
